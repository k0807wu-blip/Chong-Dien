<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>養育用品 | 蟲殿 - 昆蟲生態館</title>

    <!-- 外部資源 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/assets/css/main.css">

    <style>
        .image-placeholder {
            border-bottom: 1px solid #eee;
        }
    </style>
</head>
<body>
    <!-- 導覽列 -->
    <header class="fixed w-full z-50 transition-all duration-300" id="navbar">
        <div class="container mx-auto px-4 py-4 flex justify-between items-center">
            <a href="/index.html" class="flex items-center space-x-2">
                <div class="w-10 h-10 bg-[#1a3a3a] rounded-full flex items-center justify-center text-white text-xl font-bold">
                    蟲
                </div>
                <div class="flex flex-col">
                    <span class="text-xl font-black tracking-widest text-[#1a3a3a]">蟲殿</span>
                    <span class="text-[10px] text-gray-500 uppercase tracking-tighter">Insect Palace Ecology</span>
                </div>
            </a>

            <nav class="hidden md:flex space-x-8 font-medium">
                <a href="/index.html#about" class="hover:text-[#c5a059] transition-colors">關於蟲殿</a>
                <a href="/news/" class="hover:text-[#c5a059] transition-colors">最新消息</a>
                <a href="/supplies/" class="text-[#c5a059]">養育用品</a>
                <a href="/lives/" class="hover:text-[#c5a059] transition-colors">活體訂購</a>
                <a href="/index.html#hotel" class="hover:text-[#c5a059] transition-colors">蟲蟲旅館</a>
                <a href="/courses/" class="hover:text-[#c5a059] transition-colors">大師課程</a>
                <a href="/index.html#contact" class="hover:text-[#c5a059] transition-colors">關於我們</a>
            </nav>

            <div class="flex items-center space-x-4">
                <a href="/cart/" class="bg-[#1a3a3a] text-white px-5 py-2 rounded-full text-sm hover:bg-[#c5a059] transition-all">
                    <i class="fa-solid fa-basket-shopping mr-2"></i>(<span id="cart-count">0</span>)
                </a>
            </div>
        </div>
    </header>

    <!-- 頁面標題區 -->
    <section class="pt-32 pb-12 bg-white">
        <div class="container mx-auto px-4">
            <div class="flex flex-col md:flex-row md:items-end justify-between gap-6">
                <div>
                    <h2 class="text-[#c5a059] font-bold tracking-[0.2em] mb-2 uppercase">Supplies & Hardware</h2>
                    <h1 class="text-4xl md:text-5xl font-black text-primary title-line">養育用品</h1>
                </div>
                <!-- 分類篩選 (示範用，未串接後端) -->
                <div class="flex flex-wrap gap-2">
                    <button class="px-6 py-2 bg-primary text-white rounded-full text-sm">全部商品</button>
                    <button class="px-6 py-2 bg-gray-100 text-gray-500 hover:bg-secondary hover:text-white rounded-full text-sm transition-all">飼育箱</button>
                    <button class="px-6 py-2 bg-gray-100 text-gray-500 hover:bg-secondary hover:text-white rounded-full text-sm transition-all">發酵木屑</button>
                    <button class="px-6 py-2 bg-gray-100 text-gray-500 hover:bg-secondary hover:text-white rounded-full text-sm transition-all">營養果凍</button>
                </div>
            </div>
        </div>
    </section>

    <!-- 商品列表區 -->
    <main class="py-16">
        <div class="container mx-auto px-4">
            <div id="product-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8">
                <!-- 商品卡片由 /assets/js/products.js 的 PRODUCTS 資料動態產生 -->
            </div>
        </div>
    </main>

    <!-- 頁尾 -->
    <footer class="bg-[#1a3a3a] text-gray-400 py-12">
        <div class="container mx-auto px-4 text-center">
            <div class="flex justify-center space-x-6 mb-8 text-2xl">
                <a href="#" class="hover:text-white"><i class="fa-brands fa-facebook"></i></a>
                <a href="#" class="hover:text-white"><i class="fa-brands fa-instagram"></i></a>
                <a href="#" class="hover:text-white"><i class="fa-brands fa-line"></i></a>
            </div>
            <p class="mb-4">Designed by <span class="text-white">蟲殿團隊</span> &copy; 2026 All Rights Reserved.</p>
        </div>
    </footer>

    <script src="/assets/js/cart.js"></script>
    <script src="/assets/js/products.js"></script>
    <script>
        function priceLabel(p) {
            return p.sizes && p.sizes.length ? Math.min(...p.sizes.map(s => s.price)) : p.price;
        }

        function productCardHtml(p, idx) {
            const media = p.image
                ? `<img src="${p.image}" alt="${p.name}" class="w-full h-full object-cover transition-transform duration-500 group-hover:scale-105" />`
                : `<i class="fa-solid ${p.icon} text-6xl opacity-20 group-hover:scale-110 transition-transform duration-500"></i>`;
            const badge = p.badge
                ? `<span class="absolute top-4 left-4 bg-secondary text-white text-xs font-bold px-3 py-1 rounded-full">${p.badge}</span>`
                : '';
            return `
                <a href="/supplies/product.html?id=${p.id}" class="block bg-white rounded-3xl overflow-hidden shadow-sm hover:shadow-xl transition-all group reveal" style="transition-delay: ${idx * 0.1}s;">
                    <div class="aspect-square ${p.image ? 'overflow-hidden' : 'image-placeholder'} relative">
                        ${media}
                        ${badge}
                    </div>
                    <div class="p-6">
                        <p class="text-xs text-secondary font-bold mb-1 tracking-widest">${p.category}</p>
                        <h3 class="text-xl font-black text-primary mb-2">${p.name}</h3>
                        <p class="text-sm text-gray-500 mb-4">${p.listNote}</p>
                        <div class="flex items-center justify-between">
                            <div class="text-primary">
                                <span class="text-sm font-bold">TWD</span>
                                <span class="text-2xl font-black ml-1 tracking-tighter">${priceLabel(p)}</span>
                            </div>
                            <span class="w-10 h-10 bg-primary text-white rounded-full hover:bg-secondary transition-all flex items-center justify-center">
                                <i class="fa-solid fa-arrow-right"></i>
                            </span>
                        </div>
                    </div>
                </a>
            `;
        }

        document.getElementById('product-grid').innerHTML = PRODUCTS.map(productCardHtml).join('');
    </script>
    <script src="/assets/js/ui.js"></script>
</body>
</html>
