<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>商品 | 蟲殿 - 昆蟲生態館</title>

    <!-- 外部資源 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/assets/css/main.css">

    <style>
        .image-placeholder {
            border-bottom: 1px solid #eee;
        }
    </style>
</head>
<body>
    <header class="fixed w-full z-50 transition-all duration-300" id="navbar">
        <div class="container mx-auto px-4 py-4 flex justify-between items-center">
            <a href="/index.html" class="flex items-center space-x-2">
                <div class="w-10 h-10 bg-[#1a3a3a] rounded-full flex items-center justify-center text-white text-xl font-bold">
                    蟲
                </div>
                <div class="flex flex-col">
                    <span class="text-xl font-black tracking-widest text-[#1a3a3a]">蟲殿</span>
                    <span class="text-[10px] text-gray-500 uppercase tracking-tighter">Insect Palace Ecology</span>
                </div>
            </a>

            <nav class="hidden md:flex space-x-8 font-medium">
                <a href="/index.html#about" class="hover:text-[#c5a059] transition-colors">關於蟲殿</a>
                <a href="/news/" class="hover:text-[#c5a059] transition-colors">最新消息</a>
                <a href="/supplies/" class="text-[#c5a059]">養育用品</a>
                <a href="/lives/" class="hover:text-[#c5a059] transition-colors">活體訂購</a>
                <a href="/index.html#hotel" class="hover:text-[#c5a059] transition-colors">蟲蟲旅館</a>
                <a href="/courses/" class="hover:text-[#c5a059] transition-colors">大師課程</a>
                <a href="/index.html#contact" class="hover:text-[#c5a059] transition-colors">關於我們</a>
            </nav>

            <div class="hidden md:block">
                <a href="/cart/" class="bg-[#1a3a3a] text-white px-5 py-2 rounded-full text-sm hover:bg-[#c5a059] transition-all">
                    <i class="fa-solid fa-basket-shopping mr-2"></i>(<span id="cart-count">0</span>)
                </a>
            </div>
        </div>
    </header>

    <section class="pt-28 pb-10 bg-white">
        <div class="container mx-auto px-4">
            <div class="flex flex-col md:flex-row md:items-end justify-between gap-6">
                <div>
                    <h2 class="text-[#c5a059] font-bold tracking-[0.2em] mb-2 uppercase">Product</h2>
                    <h1 id="product-title" class="text-4xl md:text-5xl font-black text-primary title-line">商品</h1>
                </div>
                <div class="flex flex-wrap gap-2">
                    <span class="hidden px-4 py-2 bg-secondary/10 text-secondary rounded-full text-sm font-bold" id="product-stock-badge">庫存：-</span>
                </div>
            </div>
        </div>
    </section>

    <main class="py-16">
        <div class="container mx-auto px-4">
            <div id="product-card" class="max-w-4xl mx-auto bg-white rounded-3xl overflow-hidden shadow-xl reveal"></div>
        </div>
    </main>

    <footer class="bg-[#1a3a3a] text-gray-400 py-12">
        <div class="container mx-auto px-4 text-center">
            <div class="flex justify-center space-x-6 mb-8 text-2xl">
                <a href="#" class="hover:text-white"><i class="fa-brands fa-facebook"></i></a>
                <a href="#" class="hover:text-white"><i class="fa-brands fa-instagram"></i></a>
                <a href="#" class="hover:text-white"><i class="fa-brands fa-line"></i></a>
            </div>
            <p class="mb-4">Designed by <span class="text-white">蟲殿團隊</span> &copy; 2026 All Rights Reserved.</p>
        </div>
    </footer>

    <script src="/assets/js/cart.js"></script>
    <script src="/assets/js/products.js"></script>
    <script>
        function formatTwd(n) {
            return new Intl.NumberFormat('zh-TW').format(n);
        }

        function renderProduct(product) {
            document.getElementById('product-title').textContent = product.name;

            const card = document.getElementById('product-card');
            card.classList.add('active');
            document.getElementById('product-stock-badge').classList.add('hidden');

            // 有尺寸選擇的商品：只在選尺寸後顯示庫存
            if (product.sizes && product.sizes.length) {
                card.innerHTML = `
                    <div class="grid grid-cols-1 md:grid-cols-2">
                        <div class="aspect-square overflow-hidden ${product.image ? '' : 'image-placeholder'}">
                            ${
                                product.image
                                    ? `<img src="${product.image}" alt="${product.name}" class="w-full h-full object-cover" />`
                                    : `<i class="fa-solid fa-box-open text-6xl opacity-20"></i>`
                            }
                        </div>
                        <div class="p-8 md:p-12">
                            <p class="text-xs text-secondary font-bold mb-2 tracking-widest">${product.category}</p>

                            <div class="mt-2">
                                <p class="text-xs text-gray-400 uppercase tracking-widest mb-2">選擇規格 Size</p>
                                <div class="flex flex-wrap gap-2" id="size-buttons">
                                    ${product.sizes.map(s => `
                                        <button
                                            type="button"
                                            data-size-key="${s.key}"
                                            class="size-btn w-16 h-10 border border-gray-200 rounded-lg text-sm font-bold transition-all"
                                        >${s.key}</button>
                                    `).join('')}
                                </div>
                            </div>

                            <div class="mt-6 flex items-center justify-between gap-4 flex-wrap">
                                <div class="text-primary">
                                    <span class="text-sm font-bold">TWD</span>
                                    <span id="price-value" class="text-3xl font-black ml-1 tracking-tighter">-</span>
                                </div>
                            </div>

                            <p id="stock-line" class="mt-4 text-sm text-gray-500 hidden">
                                目前庫存：
                                <span id="stock-value" class="font-bold text-primary">-</span>
                            </p>

                            <p class="mt-6 text-gray-600 leading-loose">${product.description}</p>

                            <div class="mt-8 flex flex-col sm:flex-row gap-3">
                                <button
                                    type="button"
                                    id="add-to-cart"
                                    disabled
                                    class="flex-1 text-center py-3 rounded-full bg-primary text-white font-bold transition-all opacity-50 cursor-not-allowed"
                                >
                                    <i class="fa-solid fa-cart-shopping mr-2"></i>加入購物車
                                </button>
                                <a href="/supplies/" class="flex-1 text-center py-3 rounded-full border border-primary/20 text-primary font-bold hover:bg-primary/5 transition-all">
                                    返回列表
                                </a>
                            </div>
                        </div>
                    </div>
                `;

                const sizeButtons = card.querySelectorAll('#size-buttons button[data-size-key]');
                const addToCartBtn = document.getElementById('add-to-cart');
                const priceValue = document.getElementById('price-value');
                const stockLine = document.getElementById('stock-line');
                const stockValue = document.getElementById('stock-value');
                const stockBadge = document.getElementById('product-stock-badge');
                let selectedSize = null;
                let selectedPrice = null;

                sizeButtons.forEach(btn => {
                    btn.addEventListener('click', () => {
                        sizeButtons.forEach(b => b.classList.remove('active'));
                        btn.classList.add('active');

                        const key = btn.getAttribute('data-size-key');
                        const sel = product.sizes.find(s => s.key === key);
                        if (!sel) return;
                        selectedSize = sel.key;
                        selectedPrice = sel.price;

                        priceValue.textContent = formatTwd(sel.price);
                        stockValue.textContent = sel.stock;
                        stockLine.classList.remove('hidden');

                        stockBadge.textContent = `庫存：${sel.stock}`;
                        stockBadge.classList.remove('hidden');

                        addToCartBtn.disabled = false;
                        addToCartBtn.classList.remove('opacity-50', 'cursor-not-allowed');
                    });
                });

                addToCartBtn.addEventListener('click', () => {
                    if (!selectedSize || !selectedPrice) return;
                    addToCart({
                        id: product.id,
                        name: product.name,
                        category: product.category,
                        size: selectedSize,
                        price: selectedPrice,
                        qty: 1
                    });
                    alert(`已加入購物車：${product.name} (${selectedSize})`);
                });
                return;
            }

            // 一般商品（無尺寸）：直接顯示庫存
            const stockBadge = document.getElementById('product-stock-badge');
            stockBadge.textContent = `庫存：${product.stock}`;
            stockBadge.classList.remove('hidden');

            const imageHtml = product.image
                ? `<img src="${product.image}" alt="${product.name}" class="w-full h-full object-cover" />`
                : `<i class="fa-solid fa-box-open text-6xl opacity-20"></i>`;

            card.innerHTML = `
                <div class="grid grid-cols-1 md:grid-cols-2">
                    <div class="aspect-square overflow-hidden image-placeholder">
                        ${imageHtml}
                    </div>
                    <div class="p-8 md:p-12">
                        <p class="text-xs text-secondary font-bold mb-2 tracking-widest">${product.category}</p>
                        <div class="flex items-center justify-between gap-4 flex-wrap mt-2">
                            <div class="text-primary">
                                <span class="text-sm font-bold">TWD</span>
                                <span class="text-3xl font-black ml-1 tracking-tighter">${formatTwd(product.price)}</span>
                            </div>
                            <span class="px-4 py-2 bg-primary/5 text-primary rounded-full text-sm font-bold">
                                目前庫存：${product.stock}
                            </span>
                        </div>

                        <p class="mt-6 text-gray-600 leading-loose">${product.description}</p>

                        <div class="mt-8 flex flex-col sm:flex-row gap-3">
                            <button type="button" id="add-to-cart" class="flex-1 text-center py-3 rounded-full bg-primary text-white font-bold hover:bg-secondary transition-all">
                                <i class="fa-solid fa-cart-shopping mr-2"></i>加入購物車
                            </button>
                            <a href="/supplies/" class="flex-1 text-center py-3 rounded-full border border-primary/20 text-primary font-bold hover:bg-primary/5 transition-all">
                                返回列表
                            </a>
                        </div>
                    </div>
                </div>
            `;

            const addToCartBtn = document.getElementById('add-to-cart');
            if (addToCartBtn) {
                addToCartBtn.addEventListener('click', () => {
                    addToCart({
                        id: product.id,
                        name: product.name,
                        category: product.category,
                        size: null,
                        price: product.price,
                        qty: 1
                    });
                    alert(`已加入購物車：${product.name}`);
                });
            }
        }

        const params = new URLSearchParams(window.location.search);
        const id = Number(params.get('id'));
        const product = PRODUCTS.find(p => p.id === id);

        if (!product) {
            const card = document.getElementById('product-card');
            card.classList.add('active');
            card.innerHTML = `
                <div class="p-10">
                    <h2 class="text-3xl font-black text-primary mb-3">找不到商品</h2>
                    <p class="text-gray-600">請返回列表重新選擇。</p>
                    <div class="mt-8">
                        <a href="/supplies/" class="inline-block px-6 py-3 rounded-full bg-primary text-white font-bold hover:bg-secondary transition-all">
                            返回養育用品
                        </a>
                    </div>
                </div>
            `;
        } else {
            renderProduct(product);
        }
        refreshCartBadge();
    </script>
    <script src="/assets/js/ui.js"></script>
</body>
</html>
