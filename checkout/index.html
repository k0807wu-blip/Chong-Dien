<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>結帳 | 蟲殿 - 昆蟲生態館</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary:#1a3a3a; --secondary:#c5a059; --accent:#f4f1ea; --text:#2d2d2d; }
        body { font-family:'Outfit','Noto Sans TC',sans-serif; background:var(--accent); color:var(--text); }
        header.scrolled { background-color: rgba(255,255,255,.95); backdrop-filter: blur(10px); box-shadow:0 2px 10px rgba(0,0,0,.1); }
    </style>
</head>
<body>
    <header class="fixed w-full z-50 transition-all duration-300 bg-white/90 backdrop-blur-md shadow-sm" id="navbar">
        <div class="container mx-auto px-4 py-4 flex justify-between items-center">
            <a href="/index.html" class="flex items-center space-x-2">
                <div class="w-10 h-10 bg-[#1a3a3a] rounded-full flex items-center justify-center text-white text-xl font-bold">蟲</div>
                <div class="flex flex-col">
                    <span class="text-xl font-black tracking-widest text-[#1a3a3a]">蟲殿</span>
                    <span class="text-[10px] text-gray-500 uppercase tracking-tighter">Insect Palace Ecology</span>
                </div>
            </a>
            <a href="/cart/" class="bg-[#1a3a3a] text-white px-5 py-2 rounded-full text-sm hover:bg-[#c5a059] transition-all">
                返回購物車
            </a>
        </div>
    </header>

    <main class="pt-32 pb-16">
        <div class="container mx-auto px-4 grid grid-cols-1 lg:grid-cols-3 gap-8">
            <section class="lg:col-span-2 bg-white rounded-2xl p-6 md:p-8">
                <h1 class="text-3xl font-black text-primary mb-6">結帳資訊</h1>
                <form id="checkout-form" class="space-y-4">
                    <div>
                        <label class="block text-sm font-bold mb-2">收件人姓名</label>
                        <input required class="w-full border border-gray-300 rounded-xl px-4 py-3" />
                    </div>
                    <div>
                        <label class="block text-sm font-bold mb-2">聯絡電話</label>
                        <input required class="w-full border border-gray-300 rounded-xl px-4 py-3" />
                    </div>
                    <div>
                        <label class="block text-sm font-bold mb-2">收件地址</label>
                        <input required class="w-full border border-gray-300 rounded-xl px-4 py-3" />
                    </div>
                    <div>
                        <label class="block text-sm font-bold mb-2">付款方式</label>
                        <select class="w-full border border-gray-300 rounded-xl px-4 py-3">
                            <option>ATM 匯款</option>
                            <option>LINE Pay</option>
                            <option>門市取貨付款</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-bold mb-2">備註</label>
                        <textarea rows="4" class="w-full border border-gray-300 rounded-xl px-4 py-3"></textarea>
                    </div>
                    <button class="w-full bg-primary text-white py-3 rounded-xl font-bold hover:bg-secondary transition-all">
                        送出訂單
                    </button>
                </form>
            </section>

            <aside class="bg-white rounded-2xl p-6 h-fit">
                <h2 class="text-xl font-black text-primary mb-4">訂單摘要</h2>
                <div id="summary-items" class="space-y-3 text-sm"></div>
                <div class="border-t mt-4 pt-4 flex justify-between font-black text-primary">
                    <span>總計</span><span id="summary-total">TWD 0</span>
                </div>
            </aside>
        </div>
    </main>

    <script>
        const CART_KEY = 'chongdien_cart';
        const twd = n => `TWD ${new Intl.NumberFormat('zh-TW').format(n)}`;
        const cart = JSON.parse(localStorage.getItem(CART_KEY) || '[]');

        const itemsWrap = document.getElementById('summary-items');
        if (!cart.length) {
            itemsWrap.innerHTML = '<p class="text-gray-500">購物車是空的，請先加入商品。</p>';
        } else {
            itemsWrap.innerHTML = cart.map(i => `
                <div class="flex justify-between gap-3">
                    <div>
                        <p class="font-bold text-primary">${i.name}</p>
                        <p class="text-gray-500">${i.size ? `規格 ${i.size} / ` : ''}數量 ${i.qty}</p>
                    </div>
                    <p class="font-bold">${twd(i.price * i.qty)}</p>
                </div>
            `).join('');
        }

        const total = cart.reduce((sum, i) => sum + i.price * i.qty, 0);
        document.getElementById('summary-total').textContent = twd(total);

        document.getElementById('checkout-form').addEventListener('submit', (e) => {
            e.preventDefault();
            if (!cart.length) {
                alert('購物車目前是空的。');
                return;
            }
            localStorage.removeItem(CART_KEY);
            alert('訂單已送出，感謝你的訂購！');
            window.location.href = '/index.html';
        });

        window.onscroll = function() {
            const nav = document.getElementById('navbar');
            if (window.scrollY > 50) nav.classList.add('scrolled', 'py-2');
            else nav.classList.remove('scrolled', 'py-2');
        };
    </script>
</body>
</html>
